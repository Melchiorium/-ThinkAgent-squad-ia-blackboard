<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ run.project }} / {{ run.version }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='web.css') }}">
  </head>
  <body>
    <main class="page page--detail">
      <header class="header">
        <a class="back-link" href="{{ url_for('index') }}">Retour à l'accueil</a>
        <div class="run-detail__header-row">
          <div>
            <h1>{{ run.project }}</h1>
            <p>{{ run.version }}</p>
          </div>
          <form
            method="post"
            action="{{ url_for('delete_run_route', project=run.project, version=run.version) }}"
            onsubmit="return confirm('Supprimer ce run ?');"
          >
            <button type="submit" class="run-delete-button">Supprimer</button>
          </form>
        </div>
      </header>

      <section class="panel">
        {% include "_run_result.html" %}
      </section>
    </main>
  </body>
</html>
