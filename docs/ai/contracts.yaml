version: 1

blackboard_contract:
  source: app/blackboard.py
  created_by: create_blackboard
  rule: >
    Treat blackboard keys as a cross-module contract. If a key changes, update
    all producers, consumers, renderers, and docs/ai memory.
  core_fields:
    input:
      - project_brief
      - project_brief_source
      - source_version
      - source_artifacts
      - executive_evaluation
    drafts:
      - prd_draft
      - prd_draft_initial
      - product_initial_draft
      - product_revised_draft
      - product_post_correction_drafts
      - product_locked_draft
      - architecture_notes
      - mermaid_diagram
      - gtm_notes
    expert_state:
      - expert_contributions
      - expert_decisions
      - requested_changes
      - review_summaries
    decision_state:
      - arbitration
      - product_locking
      - retained_decisions
      - deferred_decisions
      - rejected_changes
      - open_points
      - unresolved_tensions
      - applied_changes
      - decisions
    readiness_and_trace:
      - readiness
      - workflow_trace
      - activity_log
    artifacts:
      - artifacts
      - risks
      - conflicts

readiness_contract:
  source: app/readiness.py
  allowed_statuses:
    - READY
    - LIMITED
    - INSUFFICIENT
  parsed_shape:
    status: string
    blocking_gaps: "list of {tag, text}"
    required_improvements: "list of {tag, text}"
    known_tags: "list of snake_case strings"
    tag_registry: object
    parse_warning: string
  required_markdown_shape: |
    Status: READY
    # or: Status: LIMITED
    # or: Status: INSUFFICIENT

    Blocking Gaps:
    - [tag_name] gap text

    Required Improvements:
    - [tag_name] improvement text
  aggregation_rule: >
    Any INSUFFICIENT makes global readiness INSUFFICIENT. Otherwise any LIMITED
    makes global readiness LIMITED. All READY makes global readiness READY.

agent_output_contracts:
  product:
    active_prompt: app/prompts V3/product_prompt.md
    parsed_sections:
      readiness_headings:
        - "## Product Readiness"
        - "## Investment Readiness"
      arbitration_heading: "## Product Arbitration"
      locking_heading: "## Product Locking"
    important_subsections:
      product_readiness:
        - Status
        - Blocking Gaps
        - Required Improvements
      product_arbitration:
        - Retained
        - Deferred
        - Rejected
        - Open Points
        - Rationales
      product_locking:
        - Confirmed In Scope
        - Confirmed Deferred
        - Confirmed Out Of Scope
        - Locking Note

  growth:
    active_prompt: app/prompts V3/growth_prompt.md
    parsed_sections:
      summary: "## Review Summary"
      decisions: "### 2 to 3 Structural GTM Decisions"
      requested_changes: "## Requested Changes"
      risks: "## Risks"
      open_questions: "## Open Questions"
      readiness: "## GTM Readiness"
    fallback: >
      If structural GTM decisions are missing, first requested changes are used
      as decisions.

  tech:
    active_prompt: app/prompts V3/tech_prompt.md
    parsed_sections:
      summary: "## Review Summary"
      decisions: "### Structural Technical Decisions"
      requested_changes: "## Requested Changes"
      risks: "## Risks"
      open_questions: "## Open Questions"
      readiness: "## Technical Readiness"
      mermaid: "### Mermaid Diagram"
    fallback: >
      If structural technical decisions are missing, first requested changes are
      used as decisions.

output_artifacts_contract:
  written_by: app/main.py
  normal_output_dir: "outputs/tests/<Project Name>/version X/"
  files:
    required:
      - project-brief.md
      - prd.md
      - architecture.md
      - gtm.md
      - blackboard.md
      - activity_log.txt
    conditional:
      - architecture-diagram.mmd
      - architecture-diagram.png
      - evaluator-report.md
  rule: >
    Do not edit generated history casually. New runs should create a new version
    directory through app/main.py unless the task explicitly asks to patch an
    existing output.

v4_output_compilation_contract:
  source: app/artifact_writer.py and app/generation_service.py
  final_output_dir: "runs/<run_id>/final_outputs/"
  public_output_dir: "outputs/tests/<Project Name>/version X/"
  files:
    required:
      - project-brief.md
      - prd.md
      - architecture.md
      - gtm.md
      - blackboard.md
      - activity_log.txt
    conditional:
      - architecture-diagram.mmd
      - architecture-diagram.png
      - evaluator-report.md
  rule: >
    V4 compiles the active run workspace into the same public historical
    artifact set used by the viewer. The compiler must read PRD_FINAL.md,
    GTM_FINAL.md, and Architecture_FINAL.md explicitly. Final outputs must
    remain readable in both the private run workspace and the public outputs
    directory.
    The V4 blackboard artifact must expose residual document gaps separately
    from open blackboard items. When all blackboard items are closed but final
    documents still contain non-ready readiness statuses, blocking gaps,
    required improvements, open questions, or Product readiness conflicts with
    Growth/Tech readiness, the blackboard renders a Residual Document Gaps
    section instead of implying complete resolution.

v4_run_workspace_contract:
  source: app/run_store.py
  root: "runs/<run_id>/"
  required_directories:
    - blackboard/items/
    - documents/product/
    - documents/tech/
    - documents/growth/
    - summaries/
    - summary_outputs/
    - activity_log/
    - final_outputs/
  run_id_rule: >
    Every run must have its own readable run_id built from a UTC timestamp,
    a normalized project slug, and a short suffix so two runs for the same
    project never overwrite each other.
  rule: >
    The run workspace is the V4 file-system home for intermediate coordination
    data. It is separate from outputs/tests/ and is the active V4 runtime
    workspace, distinct from the validated V3 baseline.

v4_blackboard_item_contract:
  source: app/blackboard_items.py
  file_pattern: "runs/<run_id>/blackboard/items/ITEM-XXX.yaml"
  fields:
    required:
      - id
      - type
      - author
      - targets
      - priority
      - status
      - tags
      - title
      - content
      - created_at
      - updated_at
    type_values:
      - QUESTION
      - RISK
      - DECISION
      - PROPOSAL
      - FEEDBACK
      - WARNING
      - CONSTRAINT
    priority_values:
      - LOW
      - MEDIUM
      - HIGH
      - CRITICAL
    status_values:
      - OPEN
      - ANSWERED
      - ACCEPTED
      - REJECTED
      - OBSOLETE
    target_values:
      - PRODUCT
      - GROWTH
      - TECH
      - ALL
      - EXTERNAL
  rule: >
    Blackboard items are atomic coordination objects. They must stay readable,
    target-specific, and manually inspectable. Status changes preserve the item
    content and only update status plus updated_at.
  routing_rule: >
    V4 item targets must include at least one explicit routing target:
    PRODUCT, GROWTH, TECH, ALL, or EXTERNAL. Topic labels belong in tags and
    must not be the only targets. ALL routes to Product, Growth, and Tech.
    EXTERNAL is not routed to an agent and must be the only target when used.
    Unknown targets must not silently default to Product. Open blackboard items
    must not be duplicated; deterministic duplicate detection prevents new
    equivalent open items with the same routing targets and materially similar
    title/content. EXTERNAL items also compare overlapping tags and shared
    decision vocabulary so launch-market, compliance, pricing, pilot-scope, and
    trust questions are not re-created through minor wording changes. Runtime
    blackboard application reuses the existing item instead of persisting the
    duplicate.
  operation_disambiguation_rule: >
    V4 blackboard operations are requested in a separate structured JSON call
    after the role document is validated. Create operations contain type,
    targets, priority, tags, title, and content; author is assigned by the
    runtime from the called role. Update operations contain only item id and
    status. The canonical JSON root is an object with create and update arrays.
    The orchestrator may narrow this schema by phase; finalization is freeze-only
    and requires an empty create array. The orchestrator also narrows create
    target enum values by role so the current role is not an allowed explicit
    create target. EXTERNAL is represented as a separate one-item target schema
    so it cannot be combined with routed Product/Growth/Tech targets. Update
    ids are narrowed per call to currently open, non-EXTERNAL items shown as
    updateable context; when no updateable item exists, update must be empty.
    If a phase is no-create and no updateable non-EXTERNAL item is available,
    the runtime skips the blackboard LLM call and writes deterministic empty
    operations with a prompt metric marked as skipped.
    Bare arrays, bare operation objects, Markdown item rows, alternate markers,
    and terminal JSON fences inside role documents are invalid.
    Item context shown to agents should keep ids visible without resembling
    operation syntax. EXTERNAL market, legal, compliance, pricing, retention,
    audit, and policy decisions must come from the brief or explicit runtime
    context; item-resolution output must not invent concrete external facts.

v4_document_contract:
  source: app/run_documents.py
  root: "runs/<run_id>/documents/"
  agent_folders:
    - product
    - tech
    - growth
  naming_rule: >
    Document names stay explicit and readable, such as PRD_V0.md,
    PRD_CANDIDATE.md, or PRD_FINAL.md. Avoid complex version resolution.
  rule: >
    Documents are the long-form source of truth. They may be versioned and
    refined, but they remain separate from summaries and blackboard items.
    V4 agents produce document content as strict JSON section objects. The
    runtime renders those section bodies into Markdown with canonical `##`
    headings before writing versioned documents. Item-resolution documents can
    advance the current role document state before candidate rewrites or
    finalization; when that happens, the affected summary is regenerated from
    the new document. Context injection is phase-aware: agents receive full
    documents only when needed for the current phase, otherwise summaries and
    routed blackboard items carry compact context.

v4_prompt_metrics_contract:
  source: runs/<run_id>/prompt_metrics.jsonl
  rule: >
    V4 records one JSONL metric per document, blackboard, and summary call, or
    per deterministic skip. Metrics include role, mode, stage, call_type,
    schema_name, model, reasoning_effort, status, and system/user/schema/output
    character counts. Metrics must never contain full prompt text.

v4_summary_cache_contract:
  source: app/run_summaries.py
  rule: >
    V4 summaries are cached within a run by source_hash. If a later document has
    identical content, the runtime reuses the previous summary content, rewrites
    source_document to the new path, keeps the same source_hash, renders YAML,
    and records a skipped summary metric. Summaries remain derivatives only.

v4_parser_contract:
  source: app/v4_parsing.py
  rule: >
    V4 role document calls return structured JSON keyed by the exact canonical
    section names for the role. Known subsections are also structured as JSON
    objects: readiness, Product Arbitration, Product Locking, Growth Build Vs
    Pilot Operations, and Tech Architecture Notes / Mermaid source. Known
    list-like sections are JSON arrays, with an empty array representing no
    content; placeholder strings such as None are invalid list items. Empty
    arrays are rendered as explicit human-readable absence statements, never as
    `None` or another placeholder. The runtime renders Markdown from those
    keys, then the parser extracts declared `##` sections, rejects duplicate
    normalized top-level headings, rejects unexpected top-level headings,
    rejects H1 titles, rejects copied cross-role deliverable headings, rejects
    placeholder-only required sections, and
    rejects any blackboard operation protocol inside the rendered document.
    Blackboard operations are parsed only from the separate structured JSON call
    and keep raw_line / line_number for failure traceability. JSON create
    operations reject unknown fields such as author. The runtime assigns author
    from the called role. Create operations targeted only to the current role
    are invalid. EXTERNAL items stay open for out-of-run information and are not
    routed into correction loops or automatically closed. Updates against
    EXTERNAL items fail. Finalization may update pre-existing items only and
    must not create new items. Growth and Tech finalization may update only
    items targeted to their own role and may not update EXTERNAL items.
  fields:
    parsed_response:
      - raw_response
      - raw_response_trace_path
      - document_text
      - sections
      - items_to_create
      - items_to_update
    parsed_item_create:
      - type
      - targets
      - priority
      - tags
      - title
      - content
      - raw_line
      - line_number
    parsed_item_update:
      - id
      - status
      - raw_line
      - line_number

v4_readiness_contract:
  source: app/v4_parsing.py
  rule: >
    Product, Growth, and Tech readiness sections must choose exactly one
    concrete status: READY, LIMITED, or INSUFFICIENT. The literal placeholder
    `READY / LIMITED / INSUFFICIENT` is invalid. Validation errors must include
    the role, mode, section, invalid status, and raw trace path. READY sections
    must not keep material blocking gaps. Any material blocking gap requires at
    least one required improvement; if no improvement is required, the point is
    not a blocking gap and must be moved elsewhere.

v4_summary_contract:
  source: app/run_summaries.py
  root: "runs/<run_id>/summaries/"
  file_pattern: "*.summary.yaml"
  required_shape: |
    summary:
      source_document: <exact source document path>
      source_hash: <exact source hash>
      scope: |
        <short grounded scope summary>
      key_decisions:
        - <short grounded decision>
      unresolved_questions:
        - <short grounded question>
      critical_risks:
        - <short grounded risk>
  rule: >
    A summary is a compressed derivative of exactly one source document.
    It must not introduce new information and must remain traceable through
    source_document and source_hash. The LLM returns a structured JSON object
    with exactly the declared fields, then the runtime renders the inspectable
    YAML summary. Raw structured summary responses are captured under
    runs/<run_id>/summary_outputs/.

v4_agent_output_contracts:
  prompt_contextualization: >
    The orchestrator composes each V4 prompt from role prompt, common workflow
    context, phase prompt, runtime context, document contract, and blackboard
    output contract. Stable role prompts define role identity and
    responsibility only. Serialization rules live in contracts.
    Document calls use structured JSON section objects; blackboard operation
    calls use a separate structured JSON object.
  product:
    role_prompt: app/prompts V4/roles/product.md
    document_contract: app/prompts V4/contracts/product_document.md
    parser: app/v4_parsing.py:parse_v4_structured_document
    document_sections:
      - Product Problem
      - Initial Wedge
      - First Target User
      - Existing Alternatives And Switching Trigger
      - Core MVP Workflow
      - In Scope
      - Out of Scope
      - MVP Build Vs Pilot Operations
      - Business Model Hypothesis
      - Critical Assumptions
      - How To Test Quickly
      - Acceptance Criteria
      - Risks And Failure Modes
      - Product Readiness
      - Product Arbitration
      - Product Locking
    blackboard_operations_format: separate structured JSON call
  growth:
    role_prompt: app/prompts V4/roles/growth.md
    document_contract: app/prompts V4/contracts/growth_document.md
    parser: app/v4_parsing.py:parse_v4_structured_document
    document_sections:
      - Go-To-Market Notes
      - Review Summary
      - Build Vs Pilot Operations
      - Critical Assumptions
      - Requested Changes
      - Risks
      - Open Questions
      - Why This Could Fail Even With Good Execution
      - GTM Readiness
    blackboard_operations_format: separate structured JSON call
  tech:
    role_prompt: app/prompts V4/roles/tech.md
    document_contract: app/prompts V4/contracts/tech_document.md
    parser: app/v4_parsing.py:parse_v4_structured_document
    document_sections:
      - Architecture Notes
      - Review Summary
      - Critical Assumptions
      - Requested Changes
      - Risks
      - Open Questions
      - Why This Could Fail Even With Good Execution
      - Technical Readiness
    architecture_notes:
      diagram_subsection: "### Mermaid Diagram"
      code_fence: "```mermaid"
      llm_field: mermaid_diagram
      runtime_renders_fence: true
    blackboard_operations_format: separate structured JSON call
  summary:
    prompt: app/prompts V4/summary_prompt.md
    parser: structured_json_then_rendered_yaml
    required_fields:
      - source_document
      - source_hash
      - scope
      - key_decisions
      - unresolved_questions
      - critical_risks

environment_contract:
  project_selection:
    - BLACKBOARD_PROJECT_NAME
    - BLACKBOARD_PROJECT_BRIEF
  prompt_selection:
    variable: BLACKBOARD_PROMPT_VERSION
    code_default: V2
    validated_value: V3
  workflow_mode:
    variable: BLACKBOARD_WORKFLOW_MODE
    supported_values:
      - second_pass
    caveat: >
      Second pass is a historical/experimental mode and is currently partly
      hardcoded in app/main.py. It is not part of the validated standard flow.
  v4_runtime:
    variable: BLACKBOARD_PROMPT_VERSION
    supported_values:
      - V4
    caveat: >
      V4 is an active runtime path with explicit initial, item-resolution,
      candidate, verification, and finalization phases. It remains separate
      from the validated V3 baseline.
  evaluator_report:
    - BLACKBOARD_EVALUATOR_REPORT
  llm:
    openai_compatible_only:
      - OPENAI_API_KEY
      - OPENAI_BASE_URL
      - OPENAI_MODEL
      - OPENAI_REASONING_EFFORT
    note: >
      Use these same variables for OpenAI and OpenAI-compatible local endpoints
      such as Ollama. OPENAI_API_KEY is required for the official OpenAI
      endpoint; local endpoints may run without it. OPENAI_REASONING_EFFORT is
      optional and is passed only when set. Gemini-specific variables are out
      of scope.
