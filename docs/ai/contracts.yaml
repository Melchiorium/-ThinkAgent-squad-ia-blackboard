version: 1

blackboard_contract:
  source: app/blackboard.py
  created_by: create_blackboard
  rule: >
    Treat blackboard keys as a cross-module contract. If a key changes, update
    all producers, consumers, renderers, and docs/ai memory.
  core_fields:
    input:
      - project_brief
      - project_brief_source
      - source_version
      - source_artifacts
      - executive_evaluation
    drafts:
      - prd_draft
      - prd_draft_initial
      - product_initial_draft
      - product_revised_draft
      - product_post_correction_drafts
      - product_locked_draft
      - architecture_notes
      - mermaid_diagram
      - gtm_notes
    expert_state:
      - expert_contributions
      - expert_decisions
      - requested_changes
      - review_summaries
    decision_state:
      - arbitration
      - product_locking
      - retained_decisions
      - deferred_decisions
      - rejected_changes
      - open_points
      - unresolved_tensions
      - applied_changes
      - decisions
    readiness_and_trace:
      - readiness
      - workflow_trace
      - activity_log
    artifacts:
      - artifacts
      - risks
      - conflicts

readiness_contract:
  source: app/readiness.py
  allowed_statuses:
    - READY
    - LIMITED
    - INSUFFICIENT
  parsed_shape:
    status: string
    blocking_gaps: "list of {tag, text}"
    required_improvements: "list of {tag, text}"
    known_tags: "list of snake_case strings"
    tag_registry: object
    parse_warning: string
  required_markdown_shape: |
    Status: READY
    # or: Status: LIMITED
    # or: Status: INSUFFICIENT

    Blocking Gaps:
    - [tag_name] gap text

    Required Improvements:
    - [tag_name] improvement text
  aggregation_rule: >
    Any INSUFFICIENT makes global readiness INSUFFICIENT. Otherwise any LIMITED
    makes global readiness LIMITED. All READY makes global readiness READY.

agent_output_contracts:
  product:
    active_prompt: app/prompts V3/product_prompt.md
    parsed_sections:
      readiness_headings:
        - "## Product Readiness"
        - "## Investment Readiness"
      arbitration_heading: "## Product Arbitration"
      locking_heading: "## Product Locking"
    important_subsections:
      product_readiness:
        - Status
        - Blocking Gaps
        - Required Improvements
      product_arbitration:
        - Retained
        - Deferred
        - Rejected
        - Open Points
        - Rationales
      product_locking:
        - Confirmed In Scope
        - Confirmed Deferred
        - Confirmed Out Of Scope
        - Locking Note

  growth:
    active_prompt: app/prompts V3/growth_prompt.md
    parsed_sections:
      summary: "## Review Summary"
      decisions: "### 2 to 3 Structural GTM Decisions"
      requested_changes: "## Requested Changes"
      risks: "## Risks"
      open_questions: "## Open Questions"
      readiness: "## GTM Readiness"
    fallback: >
      If structural GTM decisions are missing, first requested changes are used
      as decisions.

  tech:
    active_prompt: app/prompts V3/tech_prompt.md
    parsed_sections:
      summary: "## Review Summary"
      decisions: "### Structural Technical Decisions"
      requested_changes: "## Requested Changes"
      risks: "## Risks"
      open_questions: "## Open Questions"
      readiness: "## Technical Readiness"
      mermaid: "### Mermaid Diagram"
    fallback: >
      If structural technical decisions are missing, first requested changes are
      used as decisions.

output_artifacts_contract:
  written_by: app/main.py
  normal_output_dir: "outputs/tests/<Project Name>/version X/"
  files:
    required:
      - project-brief.md
      - prd.md
      - architecture.md
      - gtm.md
      - blackboard.md
      - activity_log.txt
    conditional:
      - architecture-diagram.mmd
      - architecture-diagram.png
      - evaluator-report.md
  rule: >
    Do not edit generated history casually. New runs should create a new version
    directory through app/main.py unless the task explicitly asks to patch an
    existing output.

v4_output_compilation_contract:
  source: app/artifact_writer.py and app/generation_service.py
  final_output_dir: "runs/<run_id>/final_outputs/"
  public_output_dir: "outputs/tests/<Project Name>/version X/"
  files:
    required:
      - project-brief.md
      - prd.md
      - architecture.md
      - gtm.md
      - blackboard.md
      - activity_log.txt
    conditional:
      - architecture-diagram.mmd
      - architecture-diagram.png
      - evaluator-report.md
  rule: >
    V4 compiles the active run workspace into the same public historical
    artifact set used by the viewer. The compiler must read PRD_FINAL.md,
    GTM_FINAL.md, and Architecture_FINAL.md explicitly. Final outputs must
    remain readable in both the private run workspace and the public outputs
    directory.

v4_run_workspace_contract:
  source: app/run_store.py
  root: "runs/<run_id>/"
  required_directories:
    - blackboard/items/
    - documents/product/
    - documents/tech/
    - documents/growth/
    - summaries/
    - summary_outputs/
    - activity_log/
    - final_outputs/
  run_id_rule: >
    Every run must have its own readable run_id built from a UTC timestamp,
    a normalized project slug, and a short suffix so two runs for the same
    project never overwrite each other.
  rule: >
    The run workspace is the V4 file-system home for intermediate coordination
    data. It is separate from outputs/tests/ and is the active V4 runtime
    workspace, distinct from the validated V3 baseline.

v4_blackboard_item_contract:
  source: app/blackboard_items.py
  file_pattern: "runs/<run_id>/blackboard/items/ITEM-XXX.yaml"
  fields:
    required:
      - id
      - type
      - author
      - targets
      - priority
      - status
      - tags
      - title
      - content
      - created_at
      - updated_at
    type_values:
      - QUESTION
      - RISK
      - DECISION
      - PROPOSAL
      - FEEDBACK
      - WARNING
      - CONSTRAINT
    priority_values:
      - LOW
      - MEDIUM
      - HIGH
      - CRITICAL
    status_values:
      - OPEN
      - ANSWERED
      - ACCEPTED
      - REJECTED
      - OBSOLETE
  rule: >
    Blackboard items are atomic coordination objects. They must stay readable,
    target-specific, and manually inspectable. Status changes preserve the item
    content and only update status plus updated_at.
  routing_rule: >
    V4 item targets must include at least one explicit routing target:
    PRODUCT, GROWTH, TECH, or ALL. Topic labels belong in tags and must not be
    the only targets. ALL routes to Product, Growth, and Tech. Unknown targets
    must not silently default to Product.
  operation_disambiguation_rule: >
    Create operations must start with a valid item type and must not start with
    an ITEM-### id. Update operations must contain only item id and status.
    Create operations must keep title and content as separate canonical fields
    separated by `|`.
    Item context shown to agents should keep ids visible without using
    pipe-delimited rows that resemble operation syntax.

v4_document_contract:
  source: app/run_documents.py
  root: "runs/<run_id>/documents/"
  agent_folders:
    - product
    - tech
    - growth
  naming_rule: >
    Document names stay explicit and readable, such as PRD_V0.md,
    PRD_CANDIDATE.md, or PRD_FINAL.md. Avoid complex version resolution.
  rule: >
    Documents are the long-form source of truth. They may be versioned and
    refined, but they remain separate from summaries and blackboard items.

v4_parser_contract:
  source: app/v4_parsing.py
  rule: >
    V4 agent responses are split into clean document text and internal
    blackboard operation sections. The parser must keep raw_response for
    internal trace/debug use only, must strip `## Blackboard Items To Create`
    and `## Blackboard Items To Update` from the deliverable text, must
    preserve parsed item operations for the blackboard store, and must keep
    raw_line / line_number on each parsed item for failure traceability.
    Section lookup for V4 parser-owned headings must be normalized so harmless
    casing differences in internal headings do not break parsing. Duplicate
    normalized top-level headings must fail clearly, and role documents must
    reject copied cross-role headings before write. Known role/context
    preamble headings before the first contract section are stripped as
    non-deliverable text, but unexpected headings inside the document body
    still fail validation. Duplicate required sections fail unless a trailing
    duplicate after the internal blackboard sections contains only a
    cross-reference to the earlier section; that trailing duplicate is stripped
    as non-deliverable text. The canonical create-item format keeps TITLE and
    CONTENT separated by `|`; the parser may normalize a six-field
    `TITLE: CONTENT` slip in the final field as a compatibility guard, but
    prompts must still require the canonical seven-field format.
    Tech Architecture Notes canonically use `### Mermaid Diagram` followed by
    a fenced Mermaid block. The parser may normalize a bullet-style Mermaid
    subsection into that shape when a real Mermaid graph is present.
    The internal blackboard sections are terminal protocol sections. Once both
    `## Blackboard Items To Create` and `## Blackboard Items To Update` have
    appeared, any later top-level heading is treated as non-deliverable trailing
    content and stripped before validation. Product Locking is a human-facing
    Product section before the internal blackboard sections; the parser may
    move a single late Product Locking section before the internal sections as
    a compatibility guard. Required top-level section headings canonically
    start with `##`; the parser may promote an exact bare contract heading line
    to `##` before validation. Blackboard operation lines canonically use one
    bullet marker; the parser may collapse nested leading bullet markers before
    item validation. Absence sections such as Open Questions, Requested
    Changes, and Risks must use explicit absence prose instead of `- None`; the
    parser may normalize placeholder-only absence sections to explicit absence
    prose before validation. Growth and Tech finalization may only create RISK
    or WARNING follow-up items; other create types emitted during finalization
    are downgraded to WARNING follow-ups before validation and persistence.
    Product Arbitration canonically uses the parent heading
    `## Product Arbitration`; the parser may reinsert that parent heading when
    Product emits the expected arbitration subsections directly after Product
    Readiness. Mixed target fields that include at least one valid routing
    target may have non-routing target tokens moved into tags before
    validation; target fields with no valid routing target still fail. Internal
    blackboard sections must be consecutive; human-facing sections inserted
    between `## Blackboard Items To Create` and `## Blackboard Items To Update`
    are stripped before parsing item updates. Code-like custom identifiers
    accidentally emitted in the create-item type field, such as DATA-GOV-01,
    are normalized to QUESTION and moved into tags; literal templates and
    existing ITEM-### ids still fail. Composite type tokens ending in a valid
    V4 type, such as DATA-MODEL_QUESTION, are normalized to that valid type and
    moved into tags. Growth and Tech finalization item updates are ignored
    before validation because finalization must not mutate existing verification
    item statuses. Create lines that omit author but preserve
    TYPE | TARGETS | PRIORITY | TAGS | TITLE | CONTENT are parsed with an empty
    author so the runtime default author can be applied.
  fields:
    parsed_response:
      - raw_response
      - raw_response_trace_path
      - document_text
      - sections
      - items_to_create
      - items_to_update
    parsed_item_create:
      - type
      - author
      - targets
      - priority
      - tags
      - title
      - content
      - raw_line
      - line_number
    parsed_item_update:
      - id
      - status
      - raw_line
      - line_number

v4_readiness_contract:
  source: app/v4_parsing.py
  rule: >
    Product, Growth, and Tech readiness sections must choose exactly one
    concrete status: READY, LIMITED, or INSUFFICIENT. The literal placeholder
    `READY / LIMITED / INSUFFICIENT` is invalid. Validation errors must include
    the role, mode, section, invalid status, and raw trace path.

v4_summary_contract:
  source: app/run_summaries.py
  root: "runs/<run_id>/summaries/"
  file_pattern: "*.summary.yaml"
  required_shape: |
    summary:
      source_document: <exact source document path>
      source_hash: <exact source hash>
      scope: |
        <short grounded scope summary>
      key_decisions:
        - <short grounded decision>
      unresolved_questions:
        - <short grounded question>
      critical_risks:
        - <short grounded risk>
  rule: >
    A summary is a compressed derivative of exactly one source document.
    It must not introduce new information and must remain traceable through
    source_document and source_hash. Only the declared fields are valid under
    summary, and list items must stay indented under their list field. Raw
    summary responses are captured first under runs/<run_id>/summary_outputs/
    so parse and validation failures stay inspectable.

v4_agent_output_contracts:
  prompt_contextualization: >
    The orchestrator appends small contextual step instructions to the V4
    user prompt. initial_draft includes explicit no-update guidance, and every
    mode includes a blackboard operation reminder that keeps routing targets
    separate from topic tags. Stable role prompts remain general and do not
    include copyable fake item rows.
  product:
    prompt: app/prompts V4/product_prompt.md
    parser: app/v4_parsing.py:parse_v4_agent_response
    document_sections:
      - Product Problem
      - Initial Wedge
      - First Target User
      - Existing Alternatives And Switching Trigger
      - Core MVP Workflow
      - In Scope
      - Out of Scope
      - MVP Build Vs Pilot Operations
      - Business Model Hypothesis
      - Critical Assumptions
      - How To Test Quickly
      - Acceptance Criteria
      - Risks And Failure Modes
      - Product Readiness
      - Product Arbitration
      - Product Locking
      - Blackboard Items To Create
      - Blackboard Items To Update
    item_create_format: "TYPE | AUTHOR | TARGETS | PRIORITY | TAGS | TITLE | CONTENT"
    item_update_format: "ITEM-001 | ANSWERED"
    internal_sections:
      - Blackboard Items To Create
      - Blackboard Items To Update
  growth:
    prompt: app/prompts V4/growth_prompt.md
    parser: app/v4_parsing.py:parse_v4_agent_response
    document_sections:
      - Go-To-Market Notes
      - Review Summary
      - Build Vs Pilot Operations
      - Critical Assumptions
      - Requested Changes
      - Risks
      - Open Questions
      - Why This Could Fail Even With Good Execution
      - GTM Readiness
      - Blackboard Items To Create
      - Blackboard Items To Update
    item_create_format: "TYPE | AUTHOR | TARGETS | PRIORITY | TAGS | TITLE | CONTENT"
    item_update_format: "ITEM-001 | ANSWERED"
    internal_sections:
      - Blackboard Items To Create
      - Blackboard Items To Update
  tech:
    prompt: app/prompts V4/tech_prompt.md
    parser: app/v4_parsing.py:parse_v4_agent_response
    document_sections:
      - Architecture Notes
      - Review Summary
      - Critical Assumptions
      - Requested Changes
      - Risks
      - Open Questions
      - Why This Could Fail Even With Good Execution
      - Technical Readiness
      - Blackboard Items To Create
      - Blackboard Items To Update
    architecture_notes:
      diagram_subsection: "### Mermaid Diagram"
    item_create_format: "TYPE | AUTHOR | TARGETS | PRIORITY | TAGS | TITLE | CONTENT"
    item_update_format: "ITEM-001 | ANSWERED"
    internal_sections:
      - Blackboard Items To Create
      - Blackboard Items To Update
  summary:
    prompt: app/prompts V4/summary_prompt.md
    parser: strict_yaml_subset
    required_fields:
      - source_document
      - source_hash
      - scope
      - key_decisions
      - unresolved_questions
      - critical_risks

environment_contract:
  project_selection:
    - BLACKBOARD_PROJECT_NAME
    - BLACKBOARD_PROJECT_BRIEF
  prompt_selection:
    variable: BLACKBOARD_PROMPT_VERSION
    code_default: V2
    validated_value: V3
  workflow_mode:
    variable: BLACKBOARD_WORKFLOW_MODE
    supported_values:
      - second_pass
    caveat: >
      Second pass is a historical/experimental mode and is currently partly
      hardcoded in app/main.py. It is not part of the validated standard flow.
  v4_runtime:
    variable: BLACKBOARD_PROMPT_VERSION
    supported_values:
      - V4
    caveat: >
      V4 is an active runtime path with explicit initial, item-resolution,
      candidate, verification, and finalization phases. It remains separate
      from the validated V3 baseline.
  evaluator_report:
    - BLACKBOARD_EVALUATOR_REPORT
  llm:
    openai_compatible_only:
      - OPENAI_API_KEY
      - OPENAI_BASE_URL
      - OPENAI_MODEL
    note: >
      Use these same variables for OpenAI and OpenAI-compatible local endpoints
      such as Ollama. OPENAI_API_KEY is required for the official OpenAI
      endpoint; local endpoints may run without it. Gemini-specific variables
      are out of scope.
