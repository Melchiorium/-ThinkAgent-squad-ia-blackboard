version: 1

brief_selection_flow:
  owner: app/main.py
  steps:
    - read outputs/projects/
    - prefer BLACKBOARD_PROJECT_BRIEF when set
    - otherwise match BLACKBOARD_PROJECT_NAME against project name or filename
    - if exactly one brief exists, use it
    - if multiple briefs exist with no selector, fail explicitly
  project_name_resolution:
    - first "Project name:" line in brief
    - otherwise project filename stem without project- prefix

validated_standard_flow:
  owner: app/orchestrator.py
  function: run_v0_flow
  note: >
    run_v0_flow is the code name. In documentation, call this the validated
    standard workflow.
  steps:
    - create_blackboard(project_brief, project_brief_source)
    - run_product_agent
    - run_growth_agent
    - run_tech_agent
    - run_product_revision
    - finalize_readiness
    - run_targeted_correction_loop
    - run_product_locking_pass
    - finalize_readiness
  invariant: >
    Product is the final arbiter. Growth and Tech challenge the current PRD but
    do not directly author the final PRD.

experimental_second_pass_flow:
  owner: app/orchestrator.py and app/main.py
  function: run_v2_flow
  activation: "BLACKBOARD_WORKFLOW_MODE=second_pass"
  status: historical_experiment
  current_limitations:
    - app/main.py still hardcodes outputs/version 13 and outputs/evaluation-version-13.md
    - output is written back into the source version directory
  handling_rule: >
    Treat second_pass as historical/experimental, not part of the current
    validated baseline. Change it only when a task explicitly asks to revive or
    generalize it, and validate source/output paths before relying on it.

targeted_correction_loop:
  owner: app/orchestrator.py
  trigger: "global readiness == LIMITED"
  max_loops: 2
  task_limit_per_loop: 3
  steps:
    - collect readiness blocking gaps and required improvements from Product, Tech, Growth
    - normalize, dedupe, classify, and rank gaps
    - assign owner by theme
    - build targeted correction tasks with expected outputs
    - rerun Tech only when Tech owns tasks
    - rerun Growth only when Growth owns tasks
    - rerun Product when correction tasks exist
    - finalize readiness after each loop
  stop_conditions:
    - global readiness becomes READY
    - global readiness becomes INSUFFICIENT
    - max_loops reached
  caveat: >
    This is a bounded gap-reduction loop, not a guarantee that all issues are
    resolved.

artifact_generation_flow:
  owner: app/artifact_writer.py
  function: write_run_artifacts
  output_dir: "outputs/tests/<Project Name>/version X/"
  steps:
    - write project-brief.md
    - write prd.md from blackboard.prd_draft
    - write architecture.md from blackboard.architecture_notes
    - render Mermaid artifacts with app/architecture_render.py
    - write gtm.md from blackboard.gtm_notes
    - render blackboard.md from blackboard state
    - write activity_log.txt
    - optionally write evaluator-report.md

diagram_rendering_flow:
  owner: app/architecture_render.py
  steps:
    - read blackboard.mermaid_diagram or extract Mermaid from architecture_notes
    - write architecture-diagram.mmd when source exists
    - find local node_modules/.bin/mmdc first, then global mmdc
    - render architecture-diagram.png when mmdc is available
    - record warnings in blackboard.artifacts and activity_log

validation_flows:
  no_llm_static_checks:
    commands:
      - python3 -m compileall app
      - npm run mmdc -- -h
    purpose: syntax and Mermaid CLI availability checks
  normal_llm_run:
    command: >
      set -a; source .env; export BLACKBOARD_PROMPT_VERSION=V3;
      export BLACKBOARD_PROJECT_NAME=CareSync; set +a; python3 app/main.py
  purpose: generate a new validated-style run
  caution: >
    This calls external LLM APIs and writes a new outputs/tests/<Project>/version X
    directory.

standard_generation_service_flow:
  owner: app/generation_service.py
  status: internal_service
  steps:
    - receive an in-memory project brief
    - extract or receive the project name
    - create the next outputs/tests/<Project>/version X/ directory
    - run the validated standard workflow
    - write run artifacts through app/artifact_writer.py
  limitations:
    - no web form integration yet
    - no background jobs
    - no authentication
    - no second-pass handling

web_viewer_flow:
  owner: app/web.py, app/web_storage.py, and app/web_presenters.py
  status: poc_viewer
  steps:
    - list browser-session generation jobs on /
    - render run links from done jobs only when their run still exists
    - render selected run artifacts on /runs/<project>/<version>
    - serve only allowlisted artifacts from the selected run
  limitations:
    - no global run archive section on the home page
    - no background jobs
    - no authentication

web_run_deletion_flow:
  owner: app/web.py and app/web_storage.py
  status: run_deletion
  steps:
    - resolve the run through the inventory
    - reject raw or invalid path inputs
    - delete the selected run with POST only
    - remove the run from the file inventory or Supabase artifacts table
    - remove job history entries that point to the deleted run
    - redirect back to the session generation history after deletion
  limitations:
    - no bulk delete
    - no standalone job deletion without deleting the linked run
    - no GET deletion route
    - no raw filesystem path acceptance

web_generation_job_flow:
  owner: app/web.py, app/web_jobs.py, and app/web_presenters.py
  status: poc_generation
  steps:
    - ensure a browser session id cookie exists
    - accept a project title and project brief from the web form
    - create a queued JSON job under outputs/web-jobs/
    - initialize the brief-received progress state
    - start a daemon thread for generation
    - run one generation at a time with a process-local lock
    - emit progress updates around Product, Growth, and Tech steps
    - update the job to running, done, or failed
    - use the web-only step timeout as a stale-step alert threshold while keeping the CLI path unchanged
    - link done jobs to /runs/<project>/<version>
    - hide stale done jobs when their linked run has already been deleted
  limitations:
    - no authentication
    - no user accounts
    - no persistent distributed queue
    - no retry system
    - one-process POC only

web_secret_link_access_flow:
  owner: app/web.py
  status: poc_access_control
  steps:
    - read WEB_ACCESS_TOKEN
    - allow all requests when the token is unset
    - allow static assets
    - accept access_token query parameter when it matches the configured token
    - store a non-raw-token access cookie after successful validation
    - allow later requests with a valid access cookie
    - reject other application requests with 403
  limitations:
    - not full authentication
    - no user accounts
    - no roles or permissions
    - shared-token POC only

web_render_poc_deployment_flow:
  owner: Procfile, app/web.py, and app/web_storage.py
  status: poc_deployment
  build_hint: "bash scripts/render_build.sh"
  steps:
    - install Python dependencies from requirements.txt
    - install Node dependencies with devDependencies included so Mermaid CLI is available
    - install Chrome headless shell for Puppeteer into the repo cache so Mermaid CLI can render PNGs at runtime
    - start app.web:app through gunicorn
    - bind to Render PORT
    - keep one web worker for process-local jobs
    - use WEB_ACCESS_TOKEN for shared-link access
    - use WEB_STORAGE_BACKEND=file for ephemeral smoke tests
    - use WEB_STORAGE_BACKEND=supabase with SUPABASE_DATABASE_URL for persistent storage
    - expose /healthz for service healthcheck
    - expose /readyz for manual readiness checks
    - run the deployed smoke test against the Render URL and document the result
  limitations:
    - no full authentication
    - no user accounts
    - no distributed job queue
    - no horizontal scaling
    - POC audit deployment only

web_render_smoke_test_flow:
  owner: docs/render-poc-deployment.md
  status: smoke_test
  steps:
    - open /healthz and confirm 200
    - open /readyz and confirm 200
    - open the home page without token and confirm access is denied
    - open the home page with ?access_token=<token> and confirm the viewer loads
    - submit a project title and brief
    - wait for the generation to finish
    - verify PRD, Architecture, Mermaid, GTM and logs are visible inline
    - verify the run appears in the session list and existing runs list
  limitations:
    - no persistence guarantee without a mounted disk
    - no full authentication
    - no user accounts
    - no distributed job queue
    - durable Supabase smoke test remains blocked until /readyz reports backend supabase on the live instance

web_supabase_persistence_flow:
  owner: docs/supabase-poc-storage.md and app/web_storage.py
  status: persistent_storage
  steps:
    - create a Supabase project
    - execute docs/supabase-schema.sql in SQL Editor
    - configure WEB_STORAGE_BACKEND=supabase
    - configure SUPABASE_DATABASE_URL from the Session Pooler connection string
    - confirm /readyz returns 200 with the durable backend
    - redeploy Render
    - run the storage validation script without LLM
    - confirm jobs persist in web_jobs
    - confirm run artifacts persist in web_run_artifacts
    - before generation, mirror existing Supabase run version directories into the temporary workspace so the next version number does not overwrite persisted runs after restart
  limitations:
    - no Supabase Auth
    - no Supabase Storage
    - no archived history layer
    - no automatic cleanup
    - not validated until the live instance reports backend supabase on /readyz and a real generation survives redeploy

web_storage_validation_flow:
  owner: scripts/check_web_storage.py
  status: validation
  steps:
    - detect the active backend from WEB_STORAGE_BACKEND
    - probe storage readiness before creating the fake job
    - use a temporary local root when backend is file
    - create a Storage Check job
    - write a small progression payload with blocks and events
    - transition the job through queued, running, and done
    - save fake run artifacts without any LLM call
    - list jobs, list runs, and read back an artifact
    - delete the fake run and confirm the inventory updates
  limitations:
    - no LLM calls
    - no generation workflow

web_readiness_probe_flow:
  owner: app/web.py and app/web_storage.py
  status: readiness
  steps:
    - resolve the active storage backend
    - require the shared token for /readyz when WEB_ACCESS_TOKEN is configured
    - return file backend as local and ephemeral
    - verify SUPABASE_DATABASE_URL in supabase mode
    - verify connection to Postgres in supabase mode
    - verify web_jobs and web_run_artifacts are accessible in supabase mode
  limitations:
    - no LLM calls
    - no generation workflow
    - no secret exposure

web_local_launcher_flow:
  owner: scripts/run_web.sh
  status: local_launcher
  steps:
    - cd to the repository root
    - check that .env exists
    - load .env with export auto
    - apply local defaults for BLACKBOARD_PROMPT_VERSION, WEB_HOST, WEB_PORT, and WEB_ACCESS_TOKEN
    - verify that OPENAI_API_KEY is available
    - print the local URL to open
    - launch app/web.py
  limitations:
    - local-only helper
    - no deployment orchestration
    - not used on Render
    - does not replace dashboard-managed environment variables

web_unified_generation_ui_flow:
  owner: app/web.py and app/templates/
  status: poc_ui
  steps:
    - render generation-first home page
    - accept a project title and a brief from the user
    - create a session-scoped generation job
    - show queued/running/done/failed status
    - display the current progress step, grouped blocks, and recent events
    - poll job status when JavaScript is available
    - display generated artifacts inline when the job is done
    - keep existing run detail pages available
    - hide done-job result links when the run has already been deleted
  limitations:
    - no full authentication
    - no multi-user accounts
    - no distributed queue
    - no fine-grained agent step telemetry beyond the web progress contract

recommended_change_discipline:
  - prefer one small workflow or prompt change at a time
  - validate first on CareSync and LocalLoop when changing behavior
  - do not broadly rewrite prompts and code together unless the task demands it
  - keep blackboard.md coherent with prd.md, architecture.md, and gtm.md
