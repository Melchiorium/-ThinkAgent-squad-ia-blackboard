version: 1

modules:
  - name: main
    path: app/main.py
    role: >
      Runtime entrypoint. Selects the CLI brief, delegates the standard
      generation path to generation_service, and preserves the experimental
      second-pass flow.
    read_when:
      - changing input selection
      - changing CLI-to-service handoff
      - changing run modes
      - changing second-pass behavior
      - debugging runtime entrypoint behavior
    key_functions:
      - main
      - _load_project_brief
      - _select_project_brief_path
      - _extract_project_name
      - _normalize_name
      - _outputs_root
      - _load_second_pass_sources
      - _load_evaluator_report_if_any
      - _read_text_file

  - name: orchestrator
    path: app/orchestrator.py
    role: >
      Defines the deterministic agent execution order, readiness aggregation,
      and bounded correction loop.
    read_when:
      - changing workflow order
      - changing correction loop behavior
      - changing readiness task ownership
    key_functions:
      - run_v0_flow
      - run_v2_flow
      - _finalize_readiness
      - _run_targeted_correction_loop
      - _build_correction_plan

  - name: blackboard
    path: app/blackboard.py
    role: >
      Defines the shared in-memory state schema passed between agents.
    read_when:
      - adding or renaming blackboard fields
      - modifying artifact state
      - modifying readiness state
      - modifying trace fields
    key_functions:
      - create_blackboard

  - name: product_agent
    path: app/agents/product_agent.py
    role: >
      Produces initial PRD, second-pass PRD, final PRD revision, arbitration,
      and final Product locking pass.
    read_when:
      - changing PRD behavior
      - changing Product arbitration parsing
      - changing final MVP locking behavior
    key_functions:
      - run_product_agent
      - run_product_second_pass_initial
      - run_product_revision
      - run_product_locking_pass

  - name: growth_agent
    path: app/agents/growth_agent.py
    role: >
      Reviews the PRD from launch, market access, and GTM perspective. Writes
      GTM notes and structured Growth contribution into the blackboard.
    read_when:
      - changing GTM review behavior
      - changing Growth output parsing
      - changing correction task handling for Growth
    key_functions:
      - run_growth_agent

  - name: tech_agent
    path: app/agents/tech_agent.py
    role: >
      Reviews the PRD from architecture and feasibility perspective. Writes
      architecture notes, extracts Mermaid source, and stores Tech contribution.
    read_when:
      - changing architecture review behavior
      - changing Mermaid extraction
      - changing Tech output parsing
    key_functions:
      - run_tech_agent

  - name: readiness
    path: app/readiness.py
    role: >
      Parses Product, Tech, and Growth readiness sections, infers reusable
      tags, deduplicates items, and aggregates global readiness.
    read_when:
      - changing readiness statuses
      - changing tag inference
      - changing correction loop inputs
    key_functions:
      - parse_readiness_block
      - aggregate_global_readiness
      - group_tagged_items
      - render_tagged_item

  - name: llm
    path: app/llm.py
    role: >
      Thin OpenAI-compatible client wrapper. Resolves provider, base URL, model,
      and handles common API errors.
    read_when:
      - changing model provider behavior
      - changing error handling
      - debugging connection failures
    key_functions:
      - call_llm
      - _resolve_llm_config

  - name: architecture_render
    path: app/architecture_render.py
    role: >
      Writes architecture-diagram.mmd and optionally renders
      architecture-diagram.png with Mermaid CLI.
    read_when:
      - changing diagram output
      - changing mmdc invocation
      - debugging missing PNGs
    key_functions:
      - render_architecture_diagram

  - name: prompts_v3
    path: app/prompts V3/
    role: >
      Active prompt set for validated runs. Defines expected Markdown contracts
      consumed by parsing code.
    files:
      - product_prompt.md
      - growth_prompt.md
      - tech_prompt.md

  - name: solution_workflow
    path: app/solution_workflow.py
    role: >
      Parser helpers for solution proposal experiments. Not part of the main
      current workflow according to outputs/workflow.md.
    read_when:
      - task explicitly concerns solution proposal experiments

  - name: test_agent
    path: app/agents/test_agent.py
    role: >
      Minimal legacy/test agent that writes a PRD draft only. Not part of the
      normal Product/Growth/Tech flow.
    read_when:
      - task explicitly mentions test_agent

  - name: web_runs
    path: app/web_runs.py
    role: >
      Lightweight inventory helper for generated runs. Delegates to the active
      storage backend while preserving the run inventory contract for the web
      viewer.
    read_when:
      - adding or changing run inventory logic
      - changing the web viewer's data source
      - debugging run discovery in outputs/tests/
    key_functions:
      - list_runs
      - get_run

  - name: web_presenters
    path: app/web_presenters.py
    role: >
      Pure presentation helpers for the web viewer. Builds job and run view
      models plus rendered section metadata without touching storage or Flask
      request state. Also normalizes the web progress contract for API and
      server-rendered fallbacks, including the derived progress graph used by
      the job-status UI. Link validity is still resolved by the Flask layer
      against the live run inventory.
    read_when:
      - changing web job or run view models
      - changing section rendering metadata
      - preparing web data for a future API or non-Flask frontend
    key_functions:
      - build_run_view
      - build_job_view
      - build_job_status_payload
      - build_rendered_sections
      - status_label
      - job_display_title

  - name: web_progress
    path: app/web_progress.py
    role: >
      Shared pure helpers for the web generation progress contract. Defines
      the allowed blocks, default state, event trimming, and block-status
      normalization used by the storage layer, workflow instrumentation, graph
      derivation, and browser polling UI.
    read_when:
      - changing web job progress fields
      - changing progress block definitions
      - changing web progress event structure
      - implementing or debugging the waiting-page progress UI
    key_functions:
      - build_empty_progress_state
      - build_default_progress_blocks
      - normalize_progress_state
      - normalize_progress_blocks
      - normalize_progress_events
      - build_agent_exchange_event
      - build_progress_graph
      - build_progress_event
      - apply_progress_update
      - progress_block_labels

  - name: web
    path: app/web.py
    role: >
      Flask server for the POC viewer, job flow orchestration, and shared-link
      access gate. Runs locally with the Flask dev server or on Render via
      Gunicorn. Accepts a project title plus brief on POST /jobs, shows session
      generations as the only home-page history on /, renders job status on
      /jobs/<job_id>, exposes JSON status on /api/jobs/<job_id> with progress
      telemetry, renders run details on /runs/<project>/<version>, serves
      allowlisted artifacts on /runs/<project>/<version>/artifacts/<filename>,
      exposes /healthz and /readyz, offers manual run deletion through job and
      run views, removes matching job history when a run is deleted, filters stale
      done jobs against the live run inventory, and protects the application
      routes, including /readyz, with WEB_ACCESS_TOKEN when configured.
    read_when:
      - changing Flask routes
      - changing templates
      - changing artifact display
      - changing file-serving guardrails
      - changing web brief submission
      - changing job status display
      - changing web progress polling or job progress persistence
      - changing run deletion behavior or inventory actions
      - changing access control behavior
      - changing deployment or healthcheck behavior
      - changing persistent storage defaults or backend selection
      - changing generation-first home layout
    key_functions:
      - app
      - index
      - job_status_api
      - create_job_route
      - job_status
      - run_detail
      - run_artifact
      - delete_run_route
      - healthz
      - readyz
      - _guard_secret_access
      - _outputs_root
      - _jobs_root
      - _is_stale_done_job
      - _run_generation_runner
      - _readyz_error_payload

  - name: web_jobs
    path: app/web_jobs.py
    role: >
      Backend-aware job store for the POC web generation flow. Persists
      submitted briefs, project titles, statuses, progress fields, session
      ids, output links, and errors through the active storage backend while
      keeping the file backend as default. Can also delete job history entries
      that point to a manually deleted run.
    read_when:
      - changing web job persistence
      - changing session job history
      - debugging queued/running/done/failed state
    key_functions:
      - create_session_id
      - create_job
      - get_job
      - update_job
      - delete_jobs_for_run
      - list_jobs

  - name: web_storage
    path: app/web_storage.py
    role: >
      Backend routing and persistence helpers for the web POC. Resolves
      WEB_STORAGE_BACKEND, keeps the file backend as default, and implements
      the job, progress, run-deletion, run-linked job cleanup, and run-artifact
      persistence contract for file and Supabase storage.
    read_when:
      - adding or changing storage backends
      - changing Supabase persistence behavior
      - changing job progress persistence or normalization
      - changing run deletion behavior
      - changing run artifact persistence or retrieval
      - changing the storage validation script
    key_functions:
      - resolve_web_storage_backend
      - check_storage_readiness
      - create_job
      - get_job
      - update_job
      - delete_jobs_for_run
      - list_jobs
      - list_runs
      - get_run
      - delete_run
      - load_run_sections
      - read_run_artifact
      - persist_run_artifacts
      - prepare_generation_workspace

  - name: artifact_writer
    path: app/artifact_writer.py
    role: >
      Writes run artifacts from a completed blackboard into an output
      directory: project brief, PRD, architecture, Mermaid artifacts, GTM,
      blackboard, and activity log.
    read_when:
      - changing generated artifact files
      - changing blackboard.md rendering
      - debugging Mermaid artifact writing
    key_functions:
      - write_run_artifacts

  - name: generation_service
    path: app/generation_service.py
    role: >
      Reusable standard-generation service. Runs the validated standard
      workflow from an in-memory brief and writes a new
      outputs/tests/<Project>/version X/ directory, or another outputs root
      when configured for persistent storage.
    read_when:
      - adding non-CLI generation entrypoints
      - changing standard run creation from in-memory briefs
      - debugging output version directory creation
    key_functions:
      - run_generation_from_brief
      - extract_project_name
      - next_project_version_outputs_dir

  - name: web_local_launcher
    path: scripts/run_web.sh
    role: >
      Local shell launcher for the web POC. Loads .env, applies local defaults,
      checks OPENAI_API_KEY, and starts app/web.py with the expected browser
      access token setup.
    read_when:
      - changing local web launch behavior
      - changing .env loading
      - changing local default environment variables

  - name: render_poc_deployment_doc
    path: docs/render-poc-deployment.md
    role: >
      Operational checklist for creating, smoke-testing, and documenting the
      Render web POC across ephemeral file mode, persistent Supabase mode, and
      optional paid disk mode. Includes the manual /readyz check.
    read_when:
      - configuring the Render service manually
      - documenting smoke-test results
      - verifying persistent disk behavior

  - name: supabase_poc_storage_doc
    path: docs/supabase-poc-storage.md
    role: >
      Operational guide for the Supabase-backed persistent storage mode used by
      the Render web POC.
    read_when:
      - configuring Supabase persistence
      - wiring the Render service to Supabase
      - validating the storage backend contract

  - name: supabase_schema
    path: docs/supabase-schema.sql
    role: >
      SQL schema for the web_jobs and web_run_artifacts tables used by the
      Supabase storage backend.
    read_when:
      - provisioning the Supabase schema
      - debugging storage migrations

  - name: production_audit_runbook
    path: docs/production-audit-runbook.md
    role: >
      Short human-auditable checklist for the durable Render + Supabase web
      deployment, including readiness checks and post-redeploy verification.
    read_when:
      - auditing the production web deployment
      - verifying durable storage after redeploy
      - diagnosing readiness or smoke-test issues

  - name: web_storage_validation_script
    path: scripts/check_web_storage.py
    role: >
      No-LLM storage validation script that exercises the active backend by
      creating a fake job and fake run artifacts, and by probing the active
      storage readiness before the fake run.
    read_when:
      - validating file backend behavior
      - validating Supabase backend behavior
      - verifying storage tests before deployment
