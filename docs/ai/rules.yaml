version: 1

navigation_rules:
  - Read docs/ai/00-index.yaml before coding.
  - Use task_routing from the index to choose memory and source files.
  - Do not scan outputs/ broadly. Read only the specific generated run needed.
  - Do not infer active prompts from folder names. The validated prompt set is app/prompts V3/.
  - Use README.md and outputs/workflow.md for context, but keep docs/ai as the deterministic entry point.

coding_rules:
  - Keep code simple and readable for a developer with moderate experience.
  - Prefer modular changes that match existing file responsibilities.
  - Respect the blackboard schema as a contract across modules.
  - Do not introduce new workflow concepts without updating flows.yaml and contracts.yaml.
  - Do not change prompt output headings without updating parsers and contracts.yaml.
  - Do not add broad abstractions unless they remove real duplication or clarify ownership.

v4_rules:
  - V4 is a target architecture built around runs/<run_id>/, not the current validated runtime baseline.
  - run_id must be unique per run and readable enough for manual inspection.
  - Blackboard items are atomic coordination objects and should stay short, target-specific, and manually readable.
  - Summaries are compressed derivatives of exactly one source document and must not introduce new information.
  - V4 agent responses may contain internal blackboard item sections; strip them from public deliverables and keep them only as parsed item operations.
  - V4 parsed item operations must preserve the raw source line and line number, and invalid item types, priorities, or statuses must fail before persistence.
  - V4 parsed item create operations must also validate priority before persistence.
  - V4 raw agent responses must be written to run-local trace files under runs/<run_id>/agent_outputs/ before item operations are applied.
  - V4 raw trace names must stay unique when the same role and mode repeat in a single run.
  - V4 parser-owned headings are matched by normalized heading text, but duplicate normalized top-level headings must fail clearly.
  - V4 human-facing sections must be self-contained; placeholder-only sections such as See above, As above, Same as above, See previous section, TBD, To be defined, N/A, or None must fail validation.
  - V4 absence sections such as Open Questions, Requested Changes, and Risks must use explicit absence prose instead of `- None`; parser tolerance for placeholder-only absence sections is only a compatibility guard.
  - V4 role documents may only contain their own top-level deliverable headings plus the internal blackboard sections; copied cross-role headings must fail before write.
  - V4 internal blackboard sections are terminal; no role document content may appear after `## Blackboard Items To Update`.
  - V4 internal blackboard sections must be consecutive; parser tolerance for human-facing sections inserted between create and update sections is only a compatibility guard.
  - V4 Product Locking is a human-facing Product section before the internal blackboard sections; parser tolerance for a single late Product Locking section is only a compatibility guard.
  - V4 Product Arbitration must include its parent `## Product Arbitration` heading; parser tolerance for direct arbitration subsections after Product Readiness is only a compatibility guard.
  - V4 required top-level section headings must start with `##`; parser tolerance for exact bare contract heading lines is only a compatibility guard.
  - V4 blackboard operation lines must use one bullet marker only; parser tolerance for nested leading bullet markers is only a compatibility guard.
  - V4 role/context preamble headings before the first contract section are non-deliverable and should be stripped before validation, but unexpected headings inside the document body must still fail.
  - V4 duplicate required sections must fail, except for trailing duplicate sections after the internal blackboard sections when they only contain a cross-reference to the earlier section; those are non-deliverable and stripped.
  - V4 Tech outputs must use `### Mermaid Diagram` with a fenced Mermaid block; parser tolerance for bullet-style Mermaid subsections is only a compatibility guard.
  - V4 user prompts append a small contextual step instruction block: initial_draft gets explicit no-update guidance, and every mode gets the same blackboard operation reminder.
  - V4 readiness sections must choose exactly one status from READY, LIMITED, or INSUFFICIENT. The literal placeholder READY / LIMITED / INSUFFICIENT is invalid.
  - V4 final public artifacts must come from explicit `*_FINAL.md` documents, not from latest-document sorting.
  - V4 mode labels must stay aligned across orchestrator, prompts, and docs; the canonical modes are initial_draft, review, revision, item_resolution, candidate_rewrite, verification, and finalization.
  - V4 finalization order is Product first, then Growth, then Tech. Growth finalization reads `PRD_FINAL.md`; Tech finalization reads `PRD_FINAL.md` and `GTM_FINAL.md`.
  - Growth and Tech finalization must not update existing verification item statuses. They may only create follow-up `RISK` or `WARNING` items when necessary.
  - Growth and Tech finalization updates are ignored before validation and persistence; finalization may only add follow-up warnings/risks.
  - Growth and Tech finalization create items outside `RISK` or `WARNING` are normalized to `WARNING` follow-ups before validation so finalization cannot reopen decisions.
  - V4 candidate and finalization outputs must have their parsed blackboard item operations applied immediately, then the open/resolved item state must be recomputed.
  - V4 role documents must not copy context document headings into their deliverables. Each role may only emit its own top-level contract headings plus internal blackboard sections.
  - V4 blackboard item targets must include PRODUCT, GROWTH, TECH, or ALL for routing. Topic-only targets must fail instead of defaulting to Product, and ALL must route to Product, Growth, and Tech.
  - V4 mixed target fields with at least one valid routing target may move non-routing target tokens into tags before validation; topic-only target fields still fail.
  - V4 item updates may only reference items that existed before the current agent response was applied.
  - V4 item context shown to agents must not look like blackboard operation rows. Avoid pipe-delimited `ITEM-### | ...` context rows that can be copied into create sections.
  - V4 create operations must start with a valid item type, never with an `ITEM-###` id. Existing item ids belong only in update operations.
  - V4 code-like custom identifiers in create type position may be normalized to QUESTION tags; literal template types and ITEM-### ids still fail.
  - V4 composite create type tokens ending in a valid type, such as DATA-MODEL_QUESTION, may be normalized to the embedded valid type and moved into tags.
  - V4 create lines that omit author but preserve the remaining field order may use the runtime default author.
  - V4 create operations must keep title and content as separate canonical fields with `|`; parser tolerance for a final `TITLE: CONTENT` slip is only a compatibility guard.
  - V4 update operations must contain exactly item id and status; targets, priority, tags, title, and content are create-only fields.
  - V4 prompts live under app/prompts V4/; V3 prompts remain untouched until a later lot explicitly migrates them.
  - Do not turn V4 into a generic graph engine or a full distributed queue.
  - Keep documents as the long-form source of truth and summaries as traceable derivatives.
  - V4 summary responses must be written to runs/<run_id>/summary_outputs/ before parsing or validation, and every summary failure must include the raw trace path.
  - V4 summary list fields accept `- None`, `- none`, or `- NONE` only as empty markers inside list fields; root-level bullets or unknown fields must fail clearly.
  - Keep the run workspace file-system first and easy to inspect manually.

web_rules:
  - The web access token is a POC shared-link guard. Do not expand it into full auth, accounts, roles, or OAuth unless explicitly requested.
  - Protect /readyz with the same WEB_ACCESS_TOKEN guard as the rest of the app when the token is configured.
  - Manual run deletion must go through the run inventory and POST routes only; never accept a raw filesystem path from the user.
  - WEB_AGENT_STEP_TIMEOUT_SECONDS is a UI stale-step threshold only; do not use it to cancel agent work or release the generation lock early.
  - Keep the Render deployment as a single-process POC unless a real external queue and shared job store are introduced.
  - Keep the web UI generation-first: users should be able to submit a brief and read the generated dossier without understanding internal run/job paths.
  - The web-only step timeout is controlled by WEB_AGENT_STEP_TIMEOUT_SECONDS and must not change the CLI execution path.
  - When Render should produce architecture-diagram.png, the build step must install the Node devDependencies and a Chromium browser into the repo cache so @mermaid-js/mermaid-cli can run before Gunicorn starts and at runtime.
  - Do not commit or print Supabase connection strings or other storage secrets in code, docs, logs, or prompts.
  - Readiness endpoints and storage preflight checks must report status without exposing connection strings, passwords, or token values.
  - Treat Supabase RLS warnings as expected until a dedicated lot validates an RLS strategy; do not enable or modify RLS or policies casually.

prompt_rules:
  - Preserve V3 as the validated prompt baseline unless explicitly working on another version.
  - V4 prompt changes are architect-owned. Developer lots must not edit `app/prompts V4/` unless the architect explicitly authorizes it.
  - Keep stable role prompts general; use contextual step prompts and runtime validators for stage-specific guidance and protocol enforcement.
  - Keep the V3 Paris/France deployment assumption as a global baseline rule unless a brief explicitly contradicts it.
  - Keep Product focused on MVP scope, arbitration, and final locking.
  - Keep Growth focused on launch realism and market access.
  - Keep Tech focused on feasibility, architecture, controls, and Mermaid output.
  - Do not let Growth add architecture content.
  - Do not let Tech add GTM content except direct technical or operational constraints.

output_rules:
  - Treat outputs/tests/ and outputs/tests_preliminaires/ as generated history.
  - Do not overwrite generated runs manually unless the task explicitly requires it.
  - New normal runs should create a new version directory through app/main.py.
  - architecture-diagram.png is conditional on Mermaid CLI availability.
  - Treat second-pass outputs as experimental history, not the normal output path.

quality_rules:
  - If changing runtime code, run python3 -m compileall app when feasible.
  - If changing Mermaid rendering, verify mmdc availability or run a targeted render.
  - If changing prompt contracts, inspect parser expectations before editing prompts.
  - If changing V4 parser or compiler behavior, run the no-LLM harness before relying on live LLM validation.
  - If changing correction loop logic, verify ownership and max-loop behavior.
  - If information is missing and cannot be recovered from docs/ai or targeted source reads, stop and ask the user.

forbidden:
  - blind repository scanning after memory exists
  - unvalidated breaking changes to blackboard keys
  - broad rewrites of generated output history
  - silent changes to the validated baseline assumption
  - adding dependencies without clear runtime need

memory_update_protocol:
  new_module: update docs/ai/modules.yaml
  changed_contract: update docs/ai/contracts.yaml
  changed_workflow: update docs/ai/flows.yaml
  new_guardrail_or_bug_prevention: update docs/ai/rules.yaml
  changed_navigation_or_entrypoint: update docs/ai/00-index.yaml
  changed_architecture_baseline: update docs/ai/system.yaml
