version: 1

navigation_rules:
  - Read docs/ai/00-index.yaml before coding.
  - Use task_routing from the index to choose memory and source files.
  - Do not scan outputs/ broadly. Read only the specific generated run needed.
  - Do not infer active prompts from folder names. The validated prompt set is app/prompts V3/.
  - Use README.md and outputs/workflow.md for context, but keep docs/ai as the deterministic entry point.

coding_rules:
  - Keep code simple and readable for a developer with moderate experience.
  - Prefer modular changes that match existing file responsibilities.
  - Respect the blackboard schema as a contract across modules.
  - Do not introduce new workflow concepts without updating flows.yaml and contracts.yaml.
  - Do not change prompt output headings without updating parsers and contracts.yaml.
  - Do not add broad abstractions unless they remove real duplication or clarify ownership.

v4_rules:
  - V4 is built around runs/<run_id>/ and remains separate from the validated V3 baseline.
  - run_id must be unique per run and readable enough for manual inspection.
  - Documents are the long-form source of truth; summaries are traceable derivatives only.
  - Blackboard items are atomic coordination objects and should stay short, target-specific, and manually readable.
  - Machine-facing V4 exchanges are JSON-first; Markdown is only the readable render format for PRD, GTM, and Architecture documents.
  - V4 document generation and blackboard operation generation are separate calls.
  - V4 role document calls return structured JSON section objects; the runtime renders Markdown with canonical headings.
  - V4 known subsections should be structured as nested JSON objects when the runtime can render them deterministically.
  - V4 rendered role documents must not contain BLACKBOARD_OPERATIONS, legacy blackboard item sections, JSON protocol, or machine-operation text.
  - V4 blackboard operations are structured JSON objects with create and update arrays.
  - V4 does not accept bare operation arrays, bare operation objects, alternate blackboard markers, Markdown operation rows, or terminal JSON fences inside documents.
  - V4 parsed JSON item operations must preserve raw source line and line number, and invalid item types, targets, priorities, statuses, or unknown fields must fail before persistence.
  - V4 structured document JSON traces, rendered Markdown traces, and structured blackboard JSON traces must be written under runs/<run_id>/agent_outputs/.
  - V4 parser-owned headings are matched by normalized heading text, but duplicate normalized top-level headings must fail clearly.
  - V4 required top-level section headings must start with `##`; H1 titles and unexpected `##` headings fail.
  - V4 human-facing sections must be self-contained; placeholder-only sections such as See above, As above, Same as above, TBD, N/A, or None fail validation.
  - V4 role documents may only contain their own declared top-level deliverable headings; copied cross-role headings fail before write.
  - V4 Product Arbitration must include `## Product Arbitration`.
  - V4 Tech document JSON must provide Mermaid source without code fences; the runtime renders `### Mermaid Diagram` and the ` ```mermaid` fence.
  - V4 readiness sections must choose exactly one status from READY, LIMITED, or INSUFFICIENT and include one literal `Status: ...` line.
  - V4 prompts are layered as role prompt, common workflow context, phase prompt, runtime context, and output contract.
  - V4 role prompts stay general; phase prompts and output contracts carry step-specific instructions and serialization rules.
  - V4 blackboard item targets must include PRODUCT, GROWTH, TECH, ALL, or EXTERNAL. Topic labels belong in tags.
  - EXTERNAL is used only when no Product/Growth/Tech agent can decide from current context, and EXTERNAL must be the only target when used.
  - Create operations targeted only to the current role fail; the agent should resolve those points directly in its document.
  - V4 blackboard create schemas remove the current role from explicit target enum values before the LLM call.
  - Update operations against EXTERNAL items fail; EXTERNAL items remain open unless external information is supplied.
  - Item updates may only reference items that existed before the current agent response was applied.
  - V4 blackboard update schemas narrow `id` to the currently open, non-EXTERNAL item ids updateable by the current call.
  - JSON create operations contain exactly type, targets, priority, tags, title, and content; author is assigned by the runtime.
  - JSON update operations contain exactly id and status.
  - Item resolution and candidate rewrite are no-create phases.
  - Verification may create material follow-up items; a bounded post-verification item-resolution loop must run before finalization.
  - Finalization is freeze-only: agents may update pre-existing routed items but must not create new blackboard items.
  - Growth and Tech finalization may update only items targeted to their own role.
  - V4 final public artifacts must come from explicit `*_FINAL.md` documents, not from latest-document sorting.
  - V4 finalization order is Product first, then Growth, then Tech.
  - V4 summaries are requested as structured JSON and rendered by the runtime as YAML.
  - Do not turn V4 into a generic graph engine or distributed queue.
  - V4 prompts live under app/prompts V4/; V3 prompts remain untouched until a later lot explicitly migrates them.
  - A failed live V4 run must not be relaunched until its raw trace and code path have been reviewed and a corrective plan exists.
  - Keep the run workspace file-system first and easy to inspect manually.

web_rules:
  - The web access token is a POC shared-link guard. Do not expand it into full auth, accounts, roles, or OAuth unless explicitly requested.
  - Protect /readyz with the same WEB_ACCESS_TOKEN guard as the rest of the app when the token is configured.
  - Manual run deletion must go through the run inventory and POST routes only; never accept a raw filesystem path from the user.
  - WEB_AGENT_STEP_TIMEOUT_SECONDS is a UI stale-step threshold only; do not use it to cancel agent work or release the generation lock early.
  - Keep the Render deployment as a single-process POC unless a real external queue and shared job store are introduced.
  - Keep the web UI generation-first: users should be able to submit a brief and read the generated dossier without understanding internal run/job paths.
  - The web-only step timeout is controlled by WEB_AGENT_STEP_TIMEOUT_SECONDS and must not change the CLI execution path.
  - When Render should produce architecture-diagram.png, the build step must install the Node devDependencies and a Chromium browser into the repo cache so @mermaid-js/mermaid-cli can run before Gunicorn starts and at runtime.
  - Do not commit or print Supabase connection strings or other storage secrets in code, docs, logs, or prompts.
  - Readiness endpoints and storage preflight checks must report status without exposing connection strings, passwords, or token values.
  - Treat Supabase RLS warnings as expected until a dedicated lot validates an RLS strategy; do not enable or modify RLS or policies casually.

prompt_rules:
  - Preserve V3 as the validated prompt baseline unless explicitly working on another version.
  - V4 prompt changes are architect-owned. Developer lots must not edit `app/prompts V4/` unless the architect explicitly authorizes it.
  - Keep stable role prompts general; use common workflow, phase prompts, output contracts, and runtime validators for stage-specific guidance and protocol enforcement.
  - Keep the V3 Paris/France deployment assumption as a global baseline rule unless a brief explicitly contradicts it.
  - Keep Product focused on MVP scope, arbitration, and final locking.
  - Keep Growth focused on launch realism and market access.
  - Keep Tech focused on feasibility, architecture, controls, and Mermaid output.
  - Do not let Growth add architecture content.
  - Do not let Tech add GTM content except direct technical or operational constraints.

output_rules:
  - Treat outputs/tests/ and outputs/tests_preliminaires/ as generated history.
  - Do not overwrite generated runs manually unless the task explicitly requires it.
  - New normal runs should create a new version directory through app/main.py.
  - architecture-diagram.png is conditional on Mermaid CLI availability.
  - Treat second-pass outputs as experimental history, not the normal output path.

quality_rules:
  - If changing runtime code, run python3 -m compileall app when feasible.
  - If changing Mermaid rendering, verify mmdc availability or run a targeted render.
  - If changing prompt contracts, inspect parser expectations before editing prompts.
  - If changing V4 parser or compiler behavior, run the no-LLM harness before relying on live LLM validation.
  - If a live V4 run fails, stop relaunching, inspect the raw trace and relevant code, then plan the correction before retrying.
  - If changing correction loop logic, verify ownership and max-loop behavior.
  - If information is missing and cannot be recovered from docs/ai or targeted source reads, stop and ask the user.

forbidden:
  - blind repository scanning after memory exists
  - unvalidated breaking changes to blackboard keys
  - broad rewrites of generated output history
  - silent changes to the validated baseline assumption
  - adding dependencies without clear runtime need

memory_update_protocol:
  new_module: update docs/ai/modules.yaml
  changed_contract: update docs/ai/contracts.yaml
  changed_workflow: update docs/ai/flows.yaml
  new_guardrail_or_bug_prevention: update docs/ai/rules.yaml
  changed_navigation_or_entrypoint: update docs/ai/00-index.yaml
  changed_architecture_baseline: update docs/ai/system.yaml
